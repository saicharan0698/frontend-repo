image:
  repository: REPLACE_IMAGE_REPO
  tag: REPLACE_IMAGE_TAG

replicaCount: 1

service:
  type: NodePort
  port: 80
  nodePort: 30080

resources:
  requests:
    cpu: "100m"
    memory: "64Mi"
  limits:
    cpu: "300m"
    memory: "128Mi"

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  cpuThreshold: 50
